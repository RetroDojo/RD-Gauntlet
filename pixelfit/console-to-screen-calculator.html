<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Console-to-Screen Scaling Calculator</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2e;
      --panel2: #1f2640;
      --text: #e9ecff;
      --muted: #9aa4d1;
      --accent: #66d9ef;
      --ok: #7dffa5;
      --warn: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b0e1a 0%, #121730 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid #2c345a;
      border-radius: 12px;
      padding: 14px;
    }
    h1 { font-size: 20px; margin: 0 0 10px; }
    h2 { font-size: 15px; margin: 0 0 8px; color: var(--accent); }
    p { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
    select {
      width: 100%;
      background: var(--panel2);
      color: var(--text);
      border: 1px solid #34406f;
      border-radius: 8px;
      padding: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .stat {
      background: #12182f;
      border: 1px solid #2a3563;
      border-radius: 8px;
      padding: 8px;
    }
    .k { color: var(--muted); font-size: 11px; }
    .v { font-size: 14px; font-weight: 600; margin-top: 3px; }
    .big {
      background: var(--panel);
      border: 1px solid #2c345a;
      border-radius: 12px;
      padding: 14px;
      min-height: 460px;
    }
    .viz-wrap {
      background: #0d1226;
      border: 1px solid #2a3563;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
    }
    svg { width: 100%; height: 350px; display: block; }
    .legend { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .warn { color: var(--warn); }
    .ok { color: var(--ok); }
    .notes {
      margin-top: 10px;
      background: #111735;
      border: 1px solid #2a3563;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
    }
    @media (max-width: 940px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Console-to-Screen Scaling Calculator</h1>
      <p>Original math-based planner for integer scaling, bars, and stretch distortion.</p>

      <label for="consoleSelect">Console/System</label>
      <select id="consoleSelect"></select>

      <label for="modeSelect">Resolution mode</label>
      <select id="modeSelect"></select>

      <label for="deviceSelect">Handheld device</label>
      <select id="deviceSelect"></select>

      <div class="notes" id="dataStatus"></div>
    </section>

    <section class="big">
      <h2>Scaling Output</h2>
      <div class="grid" id="stats"></div>
      <div class="viz-wrap">
        <svg id="viz" viewBox="0 0 620 360" aria-label="Scaling visualizer"></svg>
        <div class="legend">Outer frame = device panel. Inner bright frame = integer-scaled console content. Dark margins represent letterbox/pillarbox.</div>
      </div>
      <div class="notes" id="explain"></div>
    </section>
  </div>

    const fallbackDevices = JSON.parse(embeddedDeviceJson.replace(/^\uFEFF/, ''));
    const fallbackConsoles = JSON.parse(embeddedConsoleJson.replace(/^\uFEFF/, ''));

    const state = {
      devices: [],
      consoles: [],
      selectedConsoleId: null,
      selectedModeIndex: 0,
      selectedDeviceId: null,
      loadedFromFiles: false
    };

    function gcd(a, b) {
      while (b !== 0) [a, b] = [b, a % b];
      return a;
    }

    function ratioText(w, h) {
      const g = gcd(w, h);
      return `${w / g}:${h / g}`;
    }

    function ppi(w, h, d) {
      return Math.sqrt(w * w + h * h) / d;
    }

    function calc(consoleMode, device) {
      const sw = consoleMode.width;
      const sh = consoleMode.height;
      const dw = device.panelWidth;
      const dh = device.panelHeight;

      const integerScale = Math.max(0, Math.floor(Math.min(dw / sw, dh / sh)));
      const intW = sw * integerScale;
      const intH = sh * integerScale;
      const barX = Math.max(0, (dw - intW) / 2);
      const barY = Math.max(0, (dh - intH) / 2);

      const fillScaleX = dw / sw;
      const fillScaleY = dh / sh;
      const uniformFitScale = Math.min(fillScaleX, fillScaleY);
      const distortionPct = Math.abs((fillScaleX / fillScaleY) - 1) * 100;

      return {
        integerScale,
        intW,
        intH,
        barX,
        barY,
        fillScaleX,
        fillScaleY,
        uniformFitScale,
        distortionPct,
        consoleAspect: sw / sh,
        deviceAspect: dw / dh
      };
    }

    function fmt(num, digits = 2) {
      return Number.isFinite(num) ? num.toFixed(digits) : 'n/a';
    }

    function statsHtml(mode, device, out) {
      const devicePpi = ppi(device.panelWidth, device.panelHeight, device.diagonalInches);
      const bars = `L/R: ${fmt(out.barX, 1)} px, T/B: ${fmt(out.barY, 1)} px`;
      const distortionClass = out.distortionPct > 2 ? 'warn' : 'ok';

      return [
        ['Console native', `${mode.width} x ${mode.height} (${ratioText(mode.width, mode.height)})`],
        ['Device panel', `${device.panelWidth} x ${device.panelHeight} (${ratioText(device.panelWidth, device.panelHeight)})`],
        ['Device diagonal', `${fmt(device.diagonalInches, 2)}\"`],
        ['Device PPI', `${fmt(devicePpi, 2)} PPI`],
        ['Largest integer scale', out.integerScale > 0 ? `${out.integerScale}x` : 'No 1x fit'],
        ['Integer output area', `${out.intW} x ${out.intH}`],
        ['Black-bar area', bars],
        ['Uniform non-integer fit', `${fmt(out.uniformFitScale, 4)}x`],
        ['Full-screen stretch', `X ${fmt(out.fillScaleX, 4)}x / Y ${fmt(out.fillScaleY, 4)}x`],
        ['Stretch distortion', `<span class="${distortionClass}">${fmt(out.distortionPct, 2)}%</span>`]
      ].map(([k, v]) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
    }

    function drawViz(mode, device, out) {
      const svg = document.getElementById('viz');
      const pad = 24;
      const stageW = 620 - pad * 2;
      const stageH = 360 - pad * 2;
      const scale = Math.min(stageW / device.panelWidth, stageH / device.panelHeight);
      const devW = device.panelWidth * scale;
      const devH = device.panelHeight * scale;
      const devX = (620 - devW) / 2;
      const devY = (360 - devH) / 2;

      const intW = out.intW * scale;
      const intH = out.intH * scale;
      const intX = devX + (devW - intW) / 2;
      const intY = devY + (devH - intH) / 2;

      svg.innerHTML = `
        <rect x="${devX}" y="${devY}" width="${devW}" height="${devH}" rx="8" fill="#0a0e1f" stroke="#7a8ad8" stroke-width="2" />
        <rect x="${intX}" y="${intY}" width="${intW}" height="${intH}" rx="4" fill="#72f1b833" stroke="#7dffa5" stroke-width="2" />
        <text x="${devX + 8}" y="${devY + 18}" fill="#9aa4d1" font-size="12">Device: ${device.panelWidth}x${device.panelHeight}</text>
        <text x="${intX + 8}" y="${intY + 18}" fill="#d3ffe3" font-size="12">Integer content: ${out.intW}x${out.intH} (${out.integerScale}x)</text>
      `;
    }

    function update() {
      const consoleItem = state.consoles.find(c => c.id === state.selectedConsoleId);
      const device = state.devices.find(d => d.id === state.selectedDeviceId);
      const stats = document.getElementById('stats');
      const explain = document.getElementById('explain');
      if (!consoleItem || !device) return;

      const mode = consoleItem.nativeModes[state.selectedModeIndex] || consoleItem.nativeModes[0];
      const out = calc(mode, device);

      stats.innerHTML = statsHtml(mode, device, out);
      drawViz(mode, device, out);

      explain.textContent = [
        `Console notes: ${consoleItem.notes || 'n/a'}`,
        `Device notes: ${device.notes || 'n/a'}`,
        `Spec source: ${device.specSource || 'n/a'}`,
        `Verification: ${device.verification || 'n/a'}`
      ].join('\n');
    }

    function populateModeSelect() {
      const sel = document.getElementById('modeSelect');
      const consoleItem = state.consoles.find(c => c.id === state.selectedConsoleId);
      sel.innerHTML = '';
      if (!consoleItem) return;
      consoleItem.nativeModes.forEach((m, i) => {
        const o = document.createElement('option');
        o.value = String(i);
        o.textContent = `${m.label}: ${m.width}x${m.height}`;
        sel.appendChild(o);
      });
      state.selectedModeIndex = 0;
      sel.value = '0';
    }

    function populateSelects() {
      const consoleSelect = document.getElementById('consoleSelect');
      const deviceSelect = document.getElementById('deviceSelect');

      consoleSelect.innerHTML = '';
      state.consoles.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = c.name;
        consoleSelect.appendChild(o);
      });

      deviceSelect.innerHTML = '';
      state.devices.forEach(d => {
        const incomplete = !(Number.isFinite(d.panelWidth) && Number.isFinite(d.panelHeight) && Number.isFinite(d.diagonalInches));
        const o = document.createElement('option');
        o.value = d.id;
        o.disabled = incomplete;
        o.textContent = incomplete ? `${d.name} (spec incomplete)` : d.name;
        deviceSelect.appendChild(o);
      });

      state.selectedConsoleId = state.consoles[0]?.id || null;
      state.selectedDeviceId = state.devices.find(d => Number.isFinite(d.panelWidth) && Number.isFinite(d.panelHeight) && Number.isFinite(d.diagonalInches))?.id || null;
      consoleSelect.value = state.selectedConsoleId || '';
      deviceSelect.value = state.selectedDeviceId || '';

      populateModeSelect();
      update();
    }

    async function loadJson(path) {
      const resp = await fetch(path, { cache: 'no-store' });
      if (!resp.ok) throw new Error(`Could not load ${path}: ${resp.status}`);
      return resp.json();
    }

    // device-specs.json is shared with Build-VisualGrid.py and lives at the
    // RD Gauntlet repo root (one level up from this pixelfit/ folder), not
    // duplicated here. Tries the repo-root path first, then falls back to a
    // same-folder copy -- this is the only line that needs to change if
    // pixelfit/ is ever split into its own standalone repo: copy
    // device-specs.json alongside this file and the same-folder fallback
    // below will pick it up with no further edits.
    async function loadDeviceSpecs() {
      try {
        return await loadJson('../device-specs.json');
      } catch (err) {
        return loadJson('./device-specs.json');
      }
    }

    async function init() {
      const status = document.getElementById('dataStatus');
      try {
        const [devices, consoles] = await Promise.all([
          loadDeviceSpecs(),
          loadJson('./console-specs.json')
        ]);
        state.devices = devices;
        state.consoles = consoles;
        state.loadedFromFiles = true;
        status.textContent = `Loaded external JSON files. Devices: ${devices.length}, Consoles: ${consoles.length}.`;
      } catch (err) {
        state.devices = fallbackDevices;
        state.consoles = fallbackConsoles;
        state.loadedFromFiles = false;
        status.textContent = `JSON fetch unavailable (common under file:// CORS). Using embedded fallback dataset.\n${err.message}`;
      }

      populateSelects();

      document.getElementById('consoleSelect').addEventListener('change', (e) => {
        state.selectedConsoleId = e.target.value;
        populateModeSelect();
        update();
      });

      document.getElementById('modeSelect').addEventListener('change', (e) => {
        state.selectedModeIndex = Number(e.target.value) || 0;
        update();
      });

      document.getElementById('deviceSelect').addEventListener('change', (e) => {
        state.selectedDeviceId = e.target.value;
        update();
      });
    }

    init();
  </script>
</body>
</html>
